[defaults]
# Project inventory
inventory = inventory/lab.yml

# Keep output readable
stdout_callback = yaml
bin_ansible_callbacks = True

# Keep project clean
retry_files_enabled = False

# Do not stop on unknown SSH host keys in lab environments
host_key_checking = False

# Local project paths
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections
roles_path = ./roles

# Log path relative to automation/ansible because our wrapper runs from this directory
log_path = ../../logs/ansible.log

# Python interpreter discovery
interpreter_python = auto_silent

[persistent_connection]
# Use libssh instead of deprecated paramiko behavior when possible
ssh_type = libssh

# Network devices can be slow to respond
connect_timeout = 60
command_timeout = 60

# Do not log command output because it may contain sensitive information
log_messages = False

[paramiko_connection]
# Avoid Paramiko trying SSH keys before password when password auth is intended
look_for_keys = False
