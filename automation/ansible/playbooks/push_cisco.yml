---
- name: Safely push generated Cisco IOS configuration
  hosts: "{{ target_device | default('NO_TARGET_DEVICE_DEFINED') }}"
  gather_facts: false

  vars:
    required_approval: "YES_I_UNDERSTAND"
    generated_config_file: "{{ lookup('env', 'PROJECT_ROOT') }}/automation/generated-configs/cisco/{{ inventory_hostname }}.cfg"
    backup_root: "{{ lookup('env', 'PROJECT_ROOT') }}/automation/backups/cisco"

  pre_tasks:
    - name: Require explicit approval before push
      ansible.builtin.assert:
        that:
          - approve_push is defined
          - approve_push == required_approval
        fail_msg: >
          Push blocked. You must pass:
          -e approve_push=YES_I_UNDERSTAND

    - name: Check generated Cisco config exists
      ansible.builtin.stat:
        path: "{{ generated_config_file }}"
      register: generated_config_stat
      delegate_to: localhost

    - name: Fail if generated Cisco config is missing
      ansible.builtin.fail:
        msg: "Generated config not found: {{ generated_config_file }}. Run: make generate-configs"
      when: not generated_config_stat.stat.exists

    - name: Create local Cisco backup directory
      ansible.builtin.file:
        path: "{{ backup_root }}"
        state: directory
        mode: "0750"
      delegate_to: localhost

  tasks:
    - name: Backup current Cisco running-config before push
      cisco.ios.ios_command:
        commands:
          - show running-config
      register: cisco_prechange_backup

    - name: Save pre-change Cisco backup locally
      ansible.builtin.copy:
        content: "{{ cisco_prechange_backup.stdout[0] | default('') }}\n"
        dest: "{{ backup_root }}/{{ inventory_hostname }}-prepush-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}.cfg"
        mode: "0640"
      delegate_to: localhost

    - name: Show generated Cisco config path
      ansible.builtin.debug:
        msg: "Generated config file: {{ generated_config_file }}"

    - name: Final interactive confirmation
      ansible.builtin.pause:
        prompt: "Type ENTER to push generated config to {{ inventory_hostname }}, or Ctrl+C then A to abort"

    - name: Push generated Cisco configuration
      cisco.ios.ios_config:
        src: "{{ generated_config_file }}"
        save_when: modified
      register: cisco_push_result

    - name: Show Cisco push result
      ansible.builtin.debug:
        var: cisco_push_result
