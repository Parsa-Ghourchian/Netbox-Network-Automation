---
- name: Backup Cisco IOS configuration
  hosts: cisco
  gather_facts: false

  vars:
    backup_root: "../backups/cisco"

  tasks:
    - name: Create local Cisco backup directory
      ansible.builtin.file:
        path: "{{ backup_root }}"
        state: directory
        mode: "0750"
      delegate_to: localhost
      run_once: true

    - name: Collect Cisco running configuration
      cisco.ios.ios_command:
        commands:
          - show running-config
      register: cisco_running_config

    - name: Save Cisco running configuration to local file
      ansible.builtin.copy:
        content: "{{ cisco_running_config.stdout[0] | default('') }}\n"
        dest: "{{ backup_root }}/{{ inventory_hostname }}-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}.cfg"
        mode: "0640"
      delegate_to: localhost
