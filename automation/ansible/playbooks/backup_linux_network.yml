---
- name: Backup Linux network state
  hosts: linux_hosts
  gather_facts: false

  vars:
    backup_root: "../backups/linux"

  tasks:
    - name: Create local Linux backup directory
      ansible.builtin.file:
        path: "{{ backup_root }}"
        state: directory
        mode: "0750"
      delegate_to: localhost
      run_once: true

    - name: Collect Linux IP address state
      ansible.builtin.command:
        cmd: ip address show
      register: linux_ip_state
      changed_when: false

    - name: Collect Linux route state
      ansible.builtin.command:
        cmd: ip route show
      register: linux_route_state
      changed_when: false

    - name: Save Linux network state to local file
      ansible.builtin.copy:
        content: |
          # Host: {{ inventory_hostname }}
          # Generated by NetBox-driven Network Automation Lab

          ## ip address show
          {{ linux_ip_state.stdout }}

          ## ip route show
          {{ linux_route_state.stdout }}
        dest: "{{ backup_root }}/{{ inventory_hostname }}-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}.txt"
        mode: "0640"
      delegate_to: localhost
