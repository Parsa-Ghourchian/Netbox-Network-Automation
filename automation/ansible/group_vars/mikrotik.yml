---
# MikroTik RouterOS connection settings.
# Credentials are loaded from environment variables by the wrapper script.

ansible_connection: ansible.netcommon.network_cli
ansible_network_os: community.routeros.routeros
ansible_network_cli_ssh_type: libssh

ansible_user: "{{ lookup('env', 'MIKROTIK_USER') }}"
ansible_password: "{{ lookup('env', 'MIKROTIK_PASSWORD') }}"
ansible_port: "{{ lookup('env', 'MIKROTIK_PORT') | default('22', true) | int }}"

ansible_command_timeout: 60
ansible_connect_timeout: 60
